spring.application.name=student-dashboard-backend
server.port=8080

spring.datasource.url=jdbc:h2:mem:edulibrary;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=VGhpcy1pc0EtRGV2ZWxvcG1lbnQtU2VjcmV0LUtleS1Gb3ItRWR1TGlicmFyeS0zMg==
app.jwt.expiration-ms=86400000

# Password reset mail settings (set env vars to enable real email delivery)
app.mail.from=${APP_MAIL_FROM:noreply@library.local}
app.reset.base-url=${APP_RESET_BASE_URL:http://localhost:5173}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
